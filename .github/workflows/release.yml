name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            framework: net8.0-windows10.0.17763.0
            single_file: true
            artifact_ext: exe
          - os: ubuntu-latest
            rid: linux-x64
            framework: net8.0
            single_file: false
            artifact_ext: zip
          - os: macos-latest
            rid: osx-arm64
            framework: net8.0
            single_file: false
            artifact_ext: zip

    runs-on: ${{ matrix.os }}
    env:
      EnableWindowsTargeting: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: >
          dotnet publish src/Pico/Pico.csproj
          --configuration Release
          --framework ${{ matrix.framework }}
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=${{ matrix.single_file }}
          -p:EnableCompressionInSingleFile=${{ matrix.single_file }}
          -p:IncludeNativeLibrariesForSelfExtract=${{ matrix.single_file }}
          -p:DebugSymbols=false
          -p:DebugType=none
          -p:EnableWindowsTargeting=${{ env.EnableWindowsTargeting }}
          --output ./artifacts/${{ matrix.rid }}

      - name: Package archive (non-Windows)
        if: matrix.single_file == false
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $archiveName = "pico-$version-${{ matrix.rid }}.zip"
          Compress-Archive -Path "./artifacts/${{ matrix.rid }}/*" -DestinationPath "./artifacts/$archiveName"

      - name: Prepare single EXE (Windows)
        if: matrix.single_file == true
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $exe = Get-ChildItem "./artifacts/${{ matrix.rid }}" -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { throw "No executable found in publish output." }
          $targetName = "pico-$version-${{ matrix.rid }}.exe"
          Move-Item -LiteralPath $exe.FullName -Destination "./artifacts/$targetName"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.rid }}
          path: ./artifacts/*.${{ matrix.artifact_ext }}

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./release-assets/**/*.zip

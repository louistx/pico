name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            framework: net8.0-windows10.0.17763.0
          - os: ubuntu-latest
            rid: linux-x64
            framework: net8.0
          - os: macos-latest
            rid: osx-arm64
            framework: net8.0

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Pico.sln

      - name: Publish
        run: >
          dotnet publish src/Pico/Pico.csproj
          --configuration Release
          --framework ${{ matrix.framework }}
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output ./artifacts/${{ matrix.rid }}

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $archiveName = "pico-$version-${{ matrix.rid }}.zip"
          Compress-Archive -Path "./artifacts/${{ matrix.rid }}/*" -DestinationPath "./artifacts/$archiveName"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: ./artifacts/*.zip

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./release-assets/**/*.zip

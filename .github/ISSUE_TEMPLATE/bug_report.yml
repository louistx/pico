name: Bug report
description: Report a problem in PICO
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please share enough detail for us to reproduce it quickly.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and the impact.
      placeholder: Saving from clipboard base64 failed and no file was created.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us exactly how to reproduce the issue.
      placeholder: |
        1. Copy ...
        2. Open PICO ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: A preview should appear and the image should save as a PNG file.
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Windows 11 / macOS 15 / Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add logs, screenshots, clipboard sample details, or anything else that helps.
